<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropivault Admin | Manage Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #bc9393;
            --card-bg: #dec2c2;
            --text-dark: #3a2a2a;
            --text-light: #ffffff;
            --accent-glow: #ffebd2;
            --accent-green: #2d4a43;
            --error: #e74c3c;
            --success: #27ae60;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 2rem;
            background: linear-gradient(180deg, rgba(58,42,42,0.1) 0%, rgba(0,0,0,0) 100%);
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 1rem;
        }

        .header-nav a {
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .header-nav a:hover {
            color: var(--accent-glow);
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .admin-grid {
                grid-template-columns: 1fr;
            }
        }

        .admin-section {
            background-color: rgba(255, 255, 255, 0.15);
            padding: 2rem;
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 0.85rem;
            background-color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(58, 42, 42, 0.3);
            border-radius: 8px;
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent-green);
            background-color: rgba(255, 255, 255, 0.8);
        }

        .btn {
            padding: 0.85rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            width: 100%;
            background-color: var(--accent-green);
            color: var(--text-light);
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: #229954;
        }

        .btn-delete {
            background-color: var(--error);
            color: var(--text-light);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
        }

        .btn-delete:hover {
            background-color: #c0392b;
        }

        .btn-edit {
            background-color: var(--accent-glow);
            color: var(--text-dark);
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }

        .btn-edit:hover {
            background-color: #f5d9aa;
        }

        .product-list {
            display: grid;
            gap: 1rem;
        }

        .product-item {
            background-color: rgba(255, 255, 255, 0.3);
            padding: 1.25rem;
            border-radius: 12px;
            border-left: 4px solid var(--accent-green);
        }

        .product-item h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .product-item p {
            font-size: 0.9rem;
            color: rgba(58, 42, 42, 0.8);
            margin-bottom: 0.5rem;
        }

        .product-image-preview {
            width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }

        .product-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .empty-message {
            text-align: center;
            padding: 2rem;
            color: rgba(58, 42, 42, 0.6);
            font-style: italic;
        }

        .message {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }

        .message.success {
            background-color: rgba(39, 174, 96, 0.3);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .message.error {
            background-color: rgba(231, 76, 60, 0.3);
            border: 1px solid var(--error);
            color: var(--error);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dark);
            opacity: 0.8;
            letter-spacing: 0.05rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">Tropivault</div>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
            <a href="admin.html">Admin</a>
        </nav>
    </header>

    <main>
        <div class="admin-grid">
            
            <!-- LEFT: ADD/EDIT PRODUCT FORM -->
            <section class="admin-section">
                <h2>➕ Add/Edit Product</h2>
                
                <div class="message" id="formMessage"></div>

                <form id="productForm">
                    <input type="hidden" id="productId">

                    <div class="form-group">
                        <label for="productName">Product Name *</label>
                        <input type="text" id="productName" placeholder="e.g., Premium Gel Palette" required>
                    </div>

                    <div class="form-group">
                        <label for="productPrice">Price (TTD) *</label>
                        <input type="number" id="productPrice" placeholder="e.g., 180" min="0" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="productDescription">Description</label>
                        <textarea id="productDescription" rows="3" placeholder="Describe your product..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="productImage">Image URL</label>
                        <input type="url" id="productImage" placeholder="https://example.com/image.jpg">
                    </div>

                    <button type="submit" class="btn btn-primary">Add Product</button>
                    <button type="button" class="btn btn-primary" id="cancelBtn" style="display: none; background-color: #95a5a6; margin-top: 0.5rem;">Cancel Edit</button>
                </form>
            </section>

            <!-- RIGHT: PRODUCTS LIST -->
            <section class="admin-section">
                <h2>📦 Your Products</h2>
                
                <div id="productsList" class="product-list">
                    <div class="empty-message">No products yet. Add one to get started!</div>
                </div>
            </section>

        </div>
    </main>

    <footer>
        &copy; 2026 TROPIVAULT. All rights reserved. Connecting Miami to the Caribbean.
    </footer>

    <script>
        const STORAGE_KEY = 'tropivault_products';

        // Load products from localStorage
        function loadProducts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        // Save products to localStorage
        function saveProducts(products) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
        }

        // Display products
        function displayProducts() {
            const products = loadProducts();
            const productsList = document.getElementById('productsList');

            if (products.length === 0) {
                productsList.innerHTML = '<div class="empty-message">No products yet. Add one to get started!</div>';
                return;
            }

            productsList.innerHTML = products.map(product => `
                <div class="product-item">
                    ${product.image ? `<img src="${product.image}" alt="${product.name}" class="product-image-preview" onerror="this.style.display='none'">` : ''}
                    <h3>${product.name}</h3>
                    <p><strong>Price:</strong> $${parseFloat(product.price).toFixed(2)} TTD</p>
                    ${product.description ? `<p><strong>Description:</strong> ${product.description}</p>` : ''}
                    <div class="product-actions">
                        <button class="btn btn-edit" onclick="editProduct('${product.id}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteProduct('${product.id}')">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Add/Update product
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value;
            const price = document.getElementById('productPrice').value;
            const description = document.getElementById('productDescription').value;
            const image = document.getElementById('productImage').value;

            let products = loadProducts();
            const message = document.getElementById('formMessage');

            if (id) {
                // Update existing product
                const index = products.findIndex(p => p.id === id);
                if (index !== -1) {
                    products[index] = { id, name, price, description, image };
                    showMessage('Product updated successfully!', 'success');
                }
            } else {
                // Add new product
                const newProduct = {
                    id: Date.now().toString(),
                    name,
                    price,
                    description,
                    image
                };
                products.push(newProduct);
                showMessage('Product added successfully!', 'success');
            }

            saveProducts(products);
            displayProducts();
            this.reset();
            document.getElementById('productId').value = '';
            document.getElementById('cancelBtn').style.display = 'none';
            document.querySelector('.btn-primary:not(#cancelBtn)').textContent = 'Add Product';
        });

        // Edit product
        function editProduct(id) {
            const products = loadProducts();
            const product = products.find(p => p.id === id);

            if (product) {
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productImage').value = product.image || '';
                
                document.querySelector('.btn-primary:not(#cancelBtn)').textContent = 'Update Product';
                document.getElementById('cancelBtn').style.display = 'block';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Delete product
        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product?')) {
                let products = loadProducts();
                products = products.filter(p => p.id !== id);
                saveProducts(products);
                displayProducts();
                showMessage('Product deleted successfully!', 'success');
            }
        }

        // Cancel edit
        document.getElementById('cancelBtn').addEventListener('click', function() {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
            this.style.display = 'none';
            document.querySelector('.btn-primary:not(#cancelBtn)').textContent = 'Add Product';
        });

        // Show message
        function showMessage(text, type) {
            const message = document.getElementById('formMessage');
            message.textContent = text;
            message.className = `message ${type}`;
            message.style.display = 'block';
            setTimeout(() => {
                message.style.display = 'none';
            }, 3000);
        }

        // Initial load
        displayProducts();
    </script>
</body>
</html>
