<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tropivault | Shop Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #bc9393;
            --card-bg: #dec2c2;
            --text-dark: #3a2a2a;
            --text-light: #ffffff;
            --accent-glow: #ffebd2;
            --accent-green: #2d4a43;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 5rem 2rem 3rem 2rem;
            background: linear-gradient(180deg, rgba(58,42,42,0.1) 0%, rgba(0,0,0,0) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            letter-spacing: 0.3rem;
            text-transform: uppercase;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .brand-tagline {
            font-size: 1rem;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            color: var(--accent-glow);
            font-weight: 300;
            margin-bottom: 1.5rem;
        }

        .header-nav {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
        }

        .header-nav a {
            font-size: 0.9rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        .header-nav a:hover {
            color: var(--accent-glow);
        }

        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 2rem;
            text-align: center;
            color: var(--text-dark);
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            background-color: rgba(58,42,42,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
            color: rgba(58,42,42,0.6);
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .product-info {
            padding: 1.5rem;
        }

        .product-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
        }

        .product-description {
            font-size: 0.85rem;
            color: rgba(58,42,42,0.8);
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .product-price {
            font-size: 1.3rem;
            color: var(--accent-green);
            font-weight: 600;
        }

        .empty-message {
            text-align: center;
            padding: 4rem 2rem;
            background-color: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            backdrop-filter: blur(8px);
        }

        .empty-message h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        .empty-message p {
            font-size: 1rem;
            color: rgba(58,42,42,0.8);
            margin-bottom: 2rem;
        }

        .empty-message a {
            display: inline-block;
            padding: 0.85rem 2rem;
            background-color: var(--text-dark);
            color: var(--text-light);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            letter-spacing: 0.05rem;
            text-transform: uppercase;
            transition: background-color 0.3s ease;
        }

        .empty-message a:hover {
            background-color: var(--accent-green);
        }

        footer {
            text-align: center;
            padding: 4rem 2rem;
            font-size: 0.85rem;
            color: var(--text-dark);
            opacity: 0.8;
            letter-spacing: 0.05rem;
        }

        @media (max-width: 600px) {
            .brand-title {
                font-size: 2rem;
            }

            .header-nav {
                flex-direction: column;
                gap: 1rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-title">Tropivault</div>
        <div class="brand-tagline">Tropical Curios • Miami Connect</div>
        <nav class="header-nav">
            <a href="index.html">Home</a>
            <a href="products.html">Shop</a>
        </nav>
    </header>

    <main>
        <h1>🌴 Current Vault Drops</h1>
        
        <div id="productsContainer">
            <div class="empty-message">
                <h2>Coming Soon</h2>
                <p>No products available yet. Check back soon for our latest tropical curations!</p>
                <a href="index.html">Back to Home</a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 TROPIVAULT. All rights reserved. Connecting Miami to the Caribbean.
    </footer>

    <script>
        const STORAGE_KEY = 'tropivault_products';

        function loadProducts() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        function displayProducts() {
            const products = loadProducts();
            const container = document.getElementById('productsContainer');

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="empty-message">
                        <h2>Coming Soon</h2>
                        <p>No products available yet. Check back soon for our latest tropical curations!</p>
                        <a href="index.html">Back to Home</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="product-grid">
                    ${products.map(product => `
                        <div class="product-card">
                            ${product.image ? `<div class="product-image" style="background-image: url('${product.image}')"></div>` : `<div class="product-image"></div>`}
                            <div class="product-info">
                                <div class="product-name">${product.name}</div>
                                ${product.description ? `<div class="product-description">${product.description}</div>` : ''}
                                <div class="product-price">$${parseFloat(product.price).toFixed(2)} TTD</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        displayProducts();
    </script>
</body>
</html>
